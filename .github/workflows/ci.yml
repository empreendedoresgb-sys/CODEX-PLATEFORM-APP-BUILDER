name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest
      - name: Run tests
        run: pytest -q
      - name: Validate SQL schema syntax (lightweight)
        run: |
          python - <<'PY'
          from pathlib import Path
          sql = Path('database/schema.sql').read_text()
          assert 'CREATE TABLE IF NOT EXISTS builder_projects' in sql
          assert 'CREATE TABLE IF NOT EXISTS project_spec_ir' in sql
          assert 'CREATE TABLE IF NOT EXISTS run_scorecards' in sql
          assert 'CREATE TABLE IF NOT EXISTS capability_blueprints' in sql
          print('schema checks passed')
          PY
